<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esquemas de posicionamento</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h2>Positions - Comparação Visual</h2>
     <div class="caixa static">Static</div>
      <!-- Static-->
     <div class="caixa relative">Relative</div>
      <!-- Relative-->
      <div class="caixa static">Static</div>
          <!-- Static-->
       <div class="caixa absolute">Absolute</div>
       <!-- absolute-->  
        <div class="caixa static">Static</div>
      <!-- Static-->   
       <div class="caixa absolute sup">Absolute</div>
       <!-- absolute--> 
        <div class="caixa fixed">Fixed</div>
       <!-- fixed-->   
        <div class="caixa sticky">Sticky (vou grudar na tela)</div>
       <!-- Sticky-->  
        <div class="espaço">Espaço</div>
</body>
</html>
